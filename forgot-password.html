<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | USDT Mine</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-screen">
    <div class="page-shell app-page-shell">
      <div class="ambient-grid" aria-hidden="true"></div>
      <header class="topbar container app-topbar">
        <a class="brand" href="index.html" aria-label="USDT Mine home">
          <img src="logo-mark.svg" alt="" />
          <span class="brand-text">
            <strong>USDT</strong>
            <span>MINE</span>
          </span>
        </a>
      </header>

      <main class="container app-main">
        <section class="auth-layout">
          <article class="auth-side card-panel">
            <p class="auth-kicker">Recover access</p>
            <h1>Secure recovery.</h1>
            <p class="auth-lead">Enter your username or email to receive a reset link.</p>
          </article>

          <section class="card-panel auth-card">
            <div class="panel-heading">
              <h2>Forgot Password</h2>
              <p>Reset by verified email.</p>
            </div>

            <form class="form-stack" id="reset-form">
              <label class="field">
                <span>Username or email</span>
                <input id="identifier" name="identifier" type="text" placeholder="johnminer" required />
              </label>

              <button class="btn btn-primary form-submit" id="reset-submit" type="submit">
                Send Reset Email
              </button>
            </form>

            <p class="status-banner" id="reset-status" aria-live="polite"></p>

            <div class="auth-actions-row">
              <a href="login.html">Back to login</a>
              <a href="signup.html">Create account</a>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="forgot-password.js"></script>
  </body>
</html>
