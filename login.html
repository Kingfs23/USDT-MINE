<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | USDT Mine</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-screen">
    <div class="page-shell app-page-shell">
      <div class="ambient-grid" aria-hidden="true"></div>
      <header class="topbar container app-topbar">
        <a class="brand" href="index.html" aria-label="USDT Mine home">
          <img src="logo-mark.svg" alt="" />
          <span class="brand-text">
            <strong>USDT</strong>
            <span>MINE</span>
          </span>
        </a>

        <nav class="app-links" aria-label="Account links">
          <a class="is-active" href="login.html">Login</a>
          <a href="signup.html">Sign Up</a>
        </nav>
      </header>

      <main class="container app-main">
        <section class="auth-layout auth-layout-centered">
          <section class="card-panel auth-card">
            <div class="panel-heading">
              <h2>Member Login</h2>
              <p>Enter your mining console.</p>
            </div>

            <form class="form-stack" id="login-form">
              <label class="field">
                <span>Username or email</span>
                <input id="identifier" name="identifier" type="text" placeholder="johnminer" required />
              </label>

              <label class="field">
                <span>Password</span>
                <input id="password" name="password" type="password" placeholder="Your password" required />
              </label>

              <button class="btn btn-primary form-submit" id="login-submit" type="submit">Login</button>
            </form>

            <p class="status-banner" id="login-status" aria-live="polite"></p>
            <button class="btn btn-outline form-submit hidden" id="resend-verification" type="button">
              Resend verification email
            </button>

            <div class="auth-actions-row">
              <a href="forgot-password.html">Forgot password?</a>
              <a href="signup.html">Create account</a>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="login.js"></script>
  </body>
</html>
