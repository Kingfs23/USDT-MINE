<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Referrals | USDT Mine</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-screen">
    <div class="page-shell app-page-shell">
      <div class="ambient-grid" aria-hidden="true"></div>
      <header class="topbar container app-topbar">
        <a class="brand" href="index.html" aria-label="USDT Mine home">
          <img src="logo-mark.svg" alt="" />
          <span class="brand-text">
            <strong>USDT</strong>
            <span>MINE</span>
          </span>
        </a>

        <nav class="app-links" aria-label="Referral links">
          <a href="account.html">Account</a>
          <a class="is-active" href="referral.html">Referrals</a>
        </nav>
      </header>

      <main class="container app-main dashboard-main">
        <section class="wallet-shell referral-shell">
          <section class="card-panel referral-hero">
            <div class="panel-heading">
              <h2>Referrals</h2>
            </div>

            <div class="referral-link-card">
              <span>Your unique referral link</span>
              <a id="referral-link" class="referral-link" href="#" target="_blank" rel="noopener noreferrer">Loading...</a>
              <button class="btn btn-primary form-submit" id="copy-referral-link" type="button">Copy Link</button>
            </div>

            <div class="earnings-summary-grid">
              <article class="mini-stat">
                <span>Referral Code</span>
                <strong id="referral-code">-</strong>
              </article>
              <article class="mini-stat">
                <span>Total Referrals</span>
                <strong id="referral-count">0</strong>
              </article>
              <article class="mini-stat">
                <span>Capital Earned</span>
                <strong id="referral-earned">$0.00</strong>
              </article>
            </div>
          </section>

          <section class="card-panel transactions-card wallet-history-card notification-card">
            <div class="panel-heading notification-heading">
              <div>
                <span class="live-chip">Referral feed</span>
                <h2>Notifications</h2>
              </div>
              <span class="notification-state" id="referral-status" aria-live="polite"></span>
            </div>
            <div class="transactions-list" id="referral-list"></div>
          </section>
        </section>
      </main>

      <nav class="bottom-app-nav" aria-label="App navigation">
        <a href="account.html">
          <img src="icon-nav-account.svg" alt="" />
          <span>Dashboard</span>
        </a>
        <a href="miners.html">
          <img src="icon-nav-miners.svg" alt="" />
          <span>Mining</span>
        </a>
        <a href="my-miners.html">
          <img src="icon-nav-myminers.svg" alt="" />
          <span>Miners</span>
        </a>
        <a href="deposit.html">
          <img src="icon-nav-deposit.svg" alt="" />
          <span>Deposit</span>
        </a>
        <a href="withdrawal.html">
          <img src="icon-nav-withdraw.svg" alt="" />
          <span>Withdraw</span>
        </a>
        <a href="wallet.html">
          <img src="icon-nav-wallet.svg" alt="" />
          <span>Wallet</span>
        </a>
        <a class="is-active" href="referral.html">
          <img src="icon-nav-account.svg" alt="" />
          <span>Referrals</span>
        </a>
      </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="referral.js"></script>
  </body>
</html>
