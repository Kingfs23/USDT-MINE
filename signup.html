<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account | USDT Mine</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-screen">
    <div class="page-shell app-page-shell">
      <div class="ambient-grid" aria-hidden="true"></div>
      <header class="topbar container app-topbar">
        <a class="brand" href="index.html" aria-label="USDT Mine home">
          <img src="logo-mark.svg" alt="" />
          <span class="brand-text">
            <strong>USDT</strong>
            <span>MINE</span>
          </span>
        </a>

        <nav class="app-links" aria-label="Account links">
          <a href="login.html">Login</a>
          <a class="is-active" href="signup.html">Sign Up</a>
        </nav>
      </header>

      <main class="container app-main">
        <section class="auth-layout auth-layout-centered signup-only-layout">
          <section class="card-panel auth-card">
            <div class="panel-heading">
              <h2>Create Account</h2>
              <p>Access the mining console.</p>
            </div>

            <form class="form-stack" id="signup-form">
              <label class="field">
                <span>Full name</span>
                <input id="name" name="name" type="text" placeholder="John Doe" required />
              </label>

              <label class="field">
                <span>Username</span>
                <input id="username" name="username" type="text" placeholder="johnminer" required />
              </label>

              <label class="field">
                <span>Email address</span>
                <input id="email" name="email" type="email" placeholder="you@example.com" required />
              </label>

              <label class="field">
                <span>Password</span>
                <input id="password" name="password" type="password" placeholder="Minimum 6 characters" required />
              </label>

              <label class="field">
                <span>Referral code</span>
                <input id="referral-code" name="referral_code" type="text" placeholder="Optional referral code" />
              </label>

              <button class="btn btn-primary form-submit" id="signup-submit" type="submit">
                Create Account
              </button>
            </form>

            <p class="status-banner" id="signup-status" aria-live="polite"></p>

            <p class="auth-switch">
              Already have an account?
              <a href="login.html">Login</a>
            </p>
          </section>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="signup.js"></script>
  </body>
</html>
