<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Update Password | USDT Mine</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-screen">
    <div class="page-shell app-page-shell">
      <div class="ambient-grid" aria-hidden="true"></div>
      <header class="topbar container app-topbar">
        <a class="brand" href="index.html" aria-label="USDT Mine home">
          <img src="logo-mark.svg" alt="" />
          <span class="brand-text">
            <strong>USDT</strong>
            <span>MINE</span>
          </span>
        </a>
      </header>

      <main class="container app-main">
        <section class="auth-layout">
          <article class="auth-side card-panel">
            <p class="auth-kicker">Password recovery</p>
            <h1>Set a new password and recover your account.</h1>
            <p class="auth-lead">
              This page is used after the password reset email redirects the user back into the app.
            </p>
          </article>

          <section class="card-panel auth-card">
            <div class="panel-heading">
              <h2>Choose New Password</h2>
              <p>Enter the new password you want to use for the account.</p>
            </div>

            <form class="form-stack" id="update-password-form">
              <label class="field">
                <span>New password</span>
                <input id="password" name="password" type="password" placeholder="Minimum 6 characters" required />
              </label>

              <button class="btn btn-primary form-submit" id="update-password-submit" type="submit">
                Update Password
              </button>
            </form>

            <p class="status-banner" id="update-password-status" aria-live="polite"></p>
          </section>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="update-password.js"></script>
  </body>
</html>
