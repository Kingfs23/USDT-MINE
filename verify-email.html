<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Verification | USDT Mine</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-screen">
    <div class="page-shell">
      <div class="ambient-grid" aria-hidden="true"></div>
      <main class="container">
        <div class="card-panel" style="max-width: 500px; margin: 100px auto; text-align: center;">
          <h1>Verifying your email...</h1>
          <p style="margin: 20px 0; color: #666;">Please wait while we verify your email address.</p>
          <p id="status-message" style="margin-top: 20px; font-size: 14px;"></p>
          <div style="margin-top: 30px;">
            <a href="login.html" class="btn btn-primary">Back to Login</a>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
      import { supabase } from "./supabase-client.js";

      const statusMessage = document.getElementById("status-message");

      function redirectToLogin() {
        window.setTimeout(() => {
          window.location.href = "login.html?verified=1";
        }, 1600);
      }

      async function verifyEmail() {
        try {
          if (!supabase) {
            throw new Error("Supabase is not configured on this page. Check supabase-config.js.");
          }

          const params = new URLSearchParams(window.location.search);
          const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
          const code = params.get("code");
          const tokenHash = params.get("token_hash");
          const type = params.get("type") || "signup";
          const accessToken = hashParams.get("access_token");
          const refreshToken = hashParams.get("refresh_token");
          const urlError = params.get("error_description") || hashParams.get("error_description");

          if (urlError) {
            throw new Error(urlError);
          }

          if (code) {
            const { error } = await supabase.auth.exchangeCodeForSession(code);

            if (error) {
              throw error;
            }
          } else if (tokenHash) {
            const { error } = await supabase.auth.verifyOtp({
              token_hash: tokenHash,
              type,
            });

            if (error) {
              throw error;
            }
          } else if (accessToken && refreshToken) {
            const { error } = await supabase.auth.setSession({
              access_token: accessToken,
              refresh_token: refreshToken,
            });

            if (error) {
              throw error;
            }
          }

          const {
            data: { session },
            error,
          } = await supabase.auth.getSession();

          if (error || !session) {
            throw error || new Error("No verification session was found. Please open the latest verification email link.");
          }

          statusMessage.textContent = "Email verified successfully! Redirecting to login...";
          statusMessage.style.color = "#2e7d32";

          await supabase.auth.signOut();
          redirectToLogin();
        } catch (error) {
          console.error("Verification error:", error);
          statusMessage.textContent = "Verification failed: " + (error.message || "Unknown error");
          statusMessage.style.color = "#d32f2f";
        }
      }

      verifyEmail();
    </script>
  </body>
</html>
