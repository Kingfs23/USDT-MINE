<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Withdrawal | USDT Mine</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-screen">
    <div class="page-shell app-page-shell">
      <div class="ambient-grid" aria-hidden="true"></div>
      <header class="topbar container app-topbar">
        <a class="brand" href="index.html" aria-label="USDT Mine home">
          <img src="logo-mark.svg" alt="" />
          <span class="brand-text">
            <strong>USDT</strong>
            <span>MINE</span>
          </span>
        </a>

        <nav class="app-links" aria-label="Withdrawal links">
          <a href="wallet.html">History</a>
          <a class="is-active" href="withdrawal.html">Withdrawal</a>
        </nav>
      </header>

      <main class="container app-main dashboard-main">
        <section class="wallet-shell">
          <section class="card-panel action-card wallet-action-card">
            <div class="panel-heading">
              <h2>Withdrawal Request</h2>
              <p>Enter the bank account where your approved withdrawal should be sent.</p>
            </div>

            <form class="form-stack" id="withdraw-form">
              <label class="field">
                <span>Withdrawal amount (USD)</span>
                <input id="withdraw-amount" type="number" min="1" step="0.01" placeholder="50.00" required />
              </label>

              <div class="conversion-card">
                <span>Naira equivalent</span>
                <strong id="withdraw-naira">NGN 0.00</strong>
              </div>

              <label class="field">
                <span>Bank name</span>
                <input id="withdraw-bank-name" type="text" placeholder="Example: GTBank" required />
              </label>

              <label class="field">
                <span>Account number</span>
                <input id="withdraw-account-number" type="text" inputmode="numeric" placeholder="10-digit account number" required />
              </label>

              <label class="field">
                <span>Account name</span>
                <input id="withdraw-account-name" type="text" placeholder="Name on the bank account" required />
              </label>

              <button class="btn btn-outline form-submit" type="submit">Request Withdrawal</button>
            </form>

            <p class="status-banner" id="withdraw-status" aria-live="polite"></p>
          </section>

          <section class="card-panel transactions-card wallet-history-card">
            <div class="panel-heading">
              <h2>Withdrawal History</h2>
              <p>Your recent withdrawal requests appear here.</p>
            </div>
            <div class="transactions-list" id="withdraw-history-list"></div>
          </section>
        </section>
      </main>

      <nav class="bottom-app-nav" aria-label="App navigation">
        <a href="miners.html">
          <img src="icon-nav-miners.svg" alt="" />
          <span>Mining</span>
        </a>
        <a href="deposit.html">
          <img src="icon-nav-deposit.svg" alt="" />
          <span>Deposit</span>
        </a>
        <a class="is-active" href="withdrawal.html">
          <img src="icon-nav-withdraw.svg" alt="" />
          <span>Withdraw</span>
        </a>
        <a href="account.html">
          <img src="icon-nav-account.svg" alt="" />
          <span>Account</span>
        </a>
      </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="withdrawal.js"></script>
  </body>
</html>
